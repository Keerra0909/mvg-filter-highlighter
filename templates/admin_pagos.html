<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin - Pagos</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 {
            color: #38bdf8;
            margin-bottom: 5px;
        }
        p.subtitle {
            color: #94a3b8;
            margin-bottom: 25px;
        }
        .dashboard {
            background: #1e293b;
            padding: 20px;
            border-radius: 12px;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        .user-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #334155;
        }
        .user-row:last-child {
            border-bottom: none;
        }
        .user-name {
            font-size: 16px;
            font-weight: 600;
        }
        .toggle-btn {
            padding: 8px 16px;
            border: none;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-paid {
            background-color: #10b981;
            color: white;
        }
        .btn-unpaid {
            background-color: #ef4444;
            color: white;
        }
        .back-btn {
            margin-top: 30px;
            padding: 10px 20px;
            background-color: #3b82f6;
            color: white;
            border: none;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
        }
        .add-user-form {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid #334155;
            padding-bottom: 20px;
        }
        .add-user-input {
            flex: 1;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #334155;
            background: #0f172a;
            color: white;
            font-size: 14px;
        }
        .add-user-btn {
            background-color: #3b82f6;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 10px 20px;
            cursor: pointer;
            font-weight: bold;
        }
        .actions {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .del-btn {
            background: transparent;
            border: none;
            color: #ef4444;
            cursor: pointer;
            font-size: 18px;
            padding: 5px;
        }
        .tabs {
            display: flex;
            width: 100%;
            max-width: 600px;
            margin-bottom: 0;
        }
        .tab-btn {
            flex: 1;
            padding: 12px;
            background: #0f172a;
            color: #94a3b8;
            border: 1px solid #1e293b;
            border-bottom: none;
            cursor: pointer;
            font-weight: bold;
            font-size: 15px;
            border-radius: 12px 12px 0 0;
            transition: all 0.2s;
            margin: 0 2px;
        }
        .tab-btn.active {
            background: #1e293b;
            color: #38bdf8;
            border: none;
        }
        .log-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #334155;
            font-size: 15px;
        }
        .log-time {
            color: #94a3b8;
        }
    </style>
</head>
<body>
    <h1>Dashboard de Pagos 💰</h1>
    <p class="subtitle">Administra los accesos de tus compañeros (150 MXN/mes)</p>

    <div class="tabs">
        <button id="btn-tab-users" class="tab-btn active" onclick="switchTab('users')">👥 Usuarios</button>
        <button id="btn-tab-logs" class="tab-btn" onclick="switchTab('logs')">🕵️‍♂️ Historial</button>
    </div>

    <div class="dashboard" id="tab-users">
        <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; border-bottom: 2px solid #334155; padding-bottom: 20px; flex-wrap: wrap; gap: 15px;">
            <div class="add-user-form" style="margin-bottom: 0; border: none; padding: 0; flex: 1; min-width: 250px;">
                <input type="text" id="new-username" class="add-user-input" placeholder="Nuevo compañero...">
                <button class="add-user-btn" onclick="addUser()">Agregar</button>
            </div>
            <button onclick="resetMonth()" style="background-color: #f59e0b; color: white; border: none; border-radius: 8px; padding: 10px 15px; cursor: pointer; font-weight: bold; white-space: nowrap;">⚠️ Iniciar Nuevo Mes</button>
        </div>
        
        <div id="users-container">
            <!-- Users will be loaded here -->
            <p style="text-align:center; color:#94a3b8;">Cargando usuarios...</p>
        </div>
    </div>
    
    <div class="dashboard" id="tab-logs" style="display: none; border-top-left-radius: 0; border-top-right-radius: 0;">
        <h3 style="margin-top: 0; color: #38bdf8;">📊 Historial de Accesos</h3>
        <p style="color:#94a3b8; font-size:13px; margin-top:-10px; margin-bottom:15px;">Cada acceso = un uso real de la app. Da clic en el mes o día para ver el detalle.</p>
        <div id="logs-container">
            <p style="text-align:center; color:#94a3b8;">Cargando historial...</p>
        </div>
    </div>

    <a href="/" class="back-btn">⬅ Volver a la App</a>

    <script>
        function switchTab(tabName) {
            document.getElementById('tab-users').style.display = tabName === 'users' ? 'block' : 'none';
            document.getElementById('tab-logs').style.display = tabName === 'logs' ? 'block' : 'none';
            document.getElementById('btn-tab-users').className = 'tab-btn ' + (tabName === 'users' ? 'active' : '');
            document.getElementById('btn-tab-logs').className = 'tab-btn ' + (tabName === 'logs' ? 'active' : '');
            if (tabName === 'logs') loadLogs();
        }
        
        async function loadLogs() {
            try {
                const res = await fetch('/api/admin/logs');
                const logs = await res.json();
                const container = document.getElementById('logs-container');
                container.innerHTML = '';
                if (logs.length === 0) {
                    container.innerHTML = '<p style="text-align:center; color:#94a3b8;">Nadie ha iniciado sesión aún.</p>';
                    return;
                }
                
                // Group by month → day
                const monthMap = {}; // { 'julio 2026': { '2026-07-21': [ {user, time}, ... ] } }
                const monthOrder = [];
                
                logs.forEach(log => {
                    const parts = log.timestamp.split(' ');
                    const day = parts[0];   // e.g. 2026-07-21
                    const time = parts[1] || '';
                    
                    let monthKey = day;
                    let displayMonth = day;
                    try {
                        const d = new Date(day + 'T12:00:00');
                        const monthName = d.toLocaleDateString('es-MX', { month: 'long', year: 'numeric' });
                        monthKey = monthName;
                        displayMonth = monthName.charAt(0).toUpperCase() + monthName.slice(1);
                    } catch(e) {}
                    
                    if (!monthMap[monthKey]) {
                        monthMap[monthKey] = { display: displayMonth, days: {} };
                        monthOrder.push(monthKey);
                    }
                    if (!monthMap[monthKey].days[day]) {
                        monthMap[monthKey].days[day] = [];
                    }
                    monthMap[monthKey].days[day].push({ user: log.username, time });
                });
                
                monthOrder.forEach((monthKey, mIdx) => {
                    const monthData = monthMap[monthKey];
                    const days = monthData.days;
                    const monthTotal = Object.values(days).reduce((sum, arr) => sum + arr.length, 0);
                    
                    // Month header (collapsible)
                    const monthId = 'month-' + mIdx;
                    const monthHeader = document.createElement('div');
                    monthHeader.style.cssText = 'padding:12px 15px; background:linear-gradient(90deg,#1e3a5f,#1e293b); border-radius:8px; margin-bottom:6px; cursor:pointer; display:flex; justify-content:space-between; align-items:center; border-left:4px solid #0ea5e9; user-select:none;';
                    monthHeader.innerHTML = `
                        <span style="color:#38bdf8; font-weight:bold; font-size:15px;">📆 ${monthData.display}</span>
                        <span style="display:flex; gap:10px; align-items:center;">
                            <span style="background:#0ea5e9; color:white; border-radius:20px; padding:2px 12px; font-size:13px; font-weight:bold;">${monthTotal} usos</span>
                            <span class="month-arrow" style="color:#94a3b8; font-size:18px; transition:transform 0.2s;">▾</span>
                        </span>`;
                    
                    const monthBody = document.createElement('div');
                    monthBody.id = monthId;
                    // First month expanded, rest collapsed
                    monthBody.style.display = mIdx === 0 ? 'block' : 'none';
                    monthBody.style.marginBottom = '15px';
                    monthBody.style.paddingLeft = '10px';
                    
                    if (mIdx !== 0) {
                        monthHeader.querySelector('.month-arrow').style.transform = 'rotate(-90deg)';
                    }
                    
                    monthHeader.addEventListener('click', () => {
                        const isOpen = monthBody.style.display !== 'none';
                        monthBody.style.display = isOpen ? 'none' : 'block';
                        monthHeader.querySelector('.month-arrow').style.transform = isOpen ? 'rotate(-90deg)' : '';
                    });
                    
                    // Sort days newest first
                    const sortedDays = Object.keys(days).sort().reverse();
                    
                    sortedDays.forEach((day, dIdx) => {
                        const entries = days[day];
                        let displayDay = day;
                        try {
                            const d = new Date(day + 'T12:00:00');
                            displayDay = d.toLocaleDateString('es-MX', { weekday: 'long', day: 'numeric', month: 'long' });
                            displayDay = displayDay.charAt(0).toUpperCase() + displayDay.slice(1);
                        } catch(e) {}
                        
                        const dayId = monthId + '-day-' + dIdx;
                        
                        // Day header (collapsible)
                        const dayHeader = document.createElement('div');
                        dayHeader.style.cssText = 'padding:7px 12px; background:#0f172a; border-radius:6px; margin-top:6px; cursor:pointer; display:flex; justify-content:space-between; align-items:center; border-left:3px solid #334155; user-select:none;';
                        dayHeader.innerHTML = `
                            <span style="color:#cbd5e1; font-size:13px;">📅 ${displayDay}</span>
                            <span style="display:flex; gap:8px; align-items:center;">
                                <span style="background:#334155; color:#94a3b8; border-radius:20px; padding:1px 9px; font-size:12px;">${entries.length} acceso${entries.length !== 1 ? 's' : ''}</span>
                                <span class="day-arrow" style="color:#64748b; font-size:14px; transition:transform 0.2s;">▾</span>
                            </span>`;
                        
                        const dayBody = document.createElement('div');
                        dayBody.id = dayId;
                        // First day of first month expanded
                        dayBody.style.display = (mIdx === 0 && dIdx === 0) ? 'block' : 'none';
                        dayBody.style.paddingLeft = '12px';
                        
                        if (!(mIdx === 0 && dIdx === 0)) {
                            dayHeader.querySelector('.day-arrow').style.transform = 'rotate(-90deg)';
                        }
                        
                        dayHeader.addEventListener('click', () => {
                            const isOpen = dayBody.style.display !== 'none';
                            dayBody.style.display = isOpen ? 'none' : 'block';
                            dayHeader.querySelector('.day-arrow').style.transform = isOpen ? 'rotate(-90deg)' : '';
                        });
                        
                        entries.forEach(entry => {
                            const row = document.createElement('div');
                            row.style.cssText = 'padding:6px 8px; border-bottom:1px solid #1e293b; display:flex; justify-content:space-between;';
                            row.innerHTML = `<strong style="color:#e2e8f0;">👤 ${entry.user}</strong><span style="color:#64748b; font-size:13px;">🕒 ${entry.time}</span>`;
                            dayBody.appendChild(row);
                        });
                        
                        monthBody.appendChild(dayHeader);
                        monthBody.appendChild(dayBody);
                    });
                    
                    container.appendChild(monthHeader);
                    container.appendChild(monthBody);
                });
                
            } catch (err) {
                document.getElementById('logs-container').innerHTML = '<p style="color:#ef4444; text-align:center;">Error al cargar el historial.</p>';
            }
        }

        async function loadUsers() {
            try {
                const res = await fetch('/api/admin/users');
                const users = await res.json();
                
                const container = document.getElementById('users-container');
                container.innerHTML = '';
                
                users.forEach(user => {
                    const row = document.createElement('div');
                    row.className = 'user-row';
                    
                    const nameSpan = document.createElement('span');
                    nameSpan.className = 'user-name';
                    nameSpan.innerHTML = `<strong>${user.username}</strong> <span style="font-size: 13px; color: #94a3b8; font-weight: normal; margin-left: 10px;">(Clave: ${user.password})</span>`;
                    
                    const actionsDiv = document.createElement('div');
                    actionsDiv.className = 'actions';
                    
                    const btn = document.createElement('button');
                    btn.className = 'toggle-btn ' + (user.has_paid ? 'btn-paid' : 'btn-unpaid');
                    btn.textContent = user.has_paid ? '✅ PAGADO' : '❌ DEBE';
                    btn.onclick = () => togglePayment(user.id, !user.has_paid, btn);
                    
                    const editBtn = document.createElement('button');
                    editBtn.className = 'del-btn';
                    editBtn.textContent = '✏️';
                    editBtn.title = 'Editar usuario y clave';
                    editBtn.onclick = () => editUser(user.id, user.username, user.password);
                    
                    const delBtn = document.createElement('button');
                    delBtn.className = 'del-btn';
                    delBtn.textContent = '🗑️';
                    delBtn.title = 'Eliminar usuario';
                    delBtn.onclick = () => deleteUser(user.id, user.username);
                    
                    actionsDiv.appendChild(btn);
                    actionsDiv.appendChild(editBtn);
                    actionsDiv.appendChild(delBtn);
                    
                    row.appendChild(nameSpan);
                    row.appendChild(actionsDiv);
                    container.appendChild(row);
                });
            } catch (err) {
                console.error(err);
                document.getElementById('users-container').innerHTML = '<p style="color:#ef4444; text-align:center;">Error al cargar usuarios.</p>';
            }
        }

        async function togglePayment(userId, newStatus, btnElement) {
            const oldClass = newStatus ? 'btn-unpaid' : 'btn-paid';
            const newClass = newStatus ? 'btn-paid' : 'btn-unpaid';
            btnElement.classList.remove(oldClass);
            btnElement.classList.add(newClass);
            btnElement.textContent = newStatus ? '✅ PAGADO' : '❌ DEBE';
            
            try {
                await fetch('/api/admin/toggle-payment', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id: userId, has_paid: newStatus })
                });
            } catch (err) {
                alert("Error al guardar el cambio");
                loadUsers();
            }
        }

        async function addUser() {
            const input = document.getElementById('new-username');
            const username = input.value.trim();
            if (!username) {
                alert("Por favor escribe el nombre del compañero primero.");
                return;
            }
            
            try {
                const res = await fetch('/api/admin/users/add', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username })
                });
                const data = await res.json();
                if (data.ok) {
                    input.value = '';
                    loadUsers();
                } else {
                    alert(data.error || "Error al agregar usuario");
                }
            } catch (err) {
                alert("Error de conexión");
            }
        }

        async function editUser(id, oldUsername, oldPassword) {
            const newUsername = prompt("Modificar Nombre de Usuario:", oldUsername);
            if (newUsername === null) return;
            const newPassword = prompt(`Modificar Contraseña para ${newUsername}:`, oldPassword);
            if (newPassword === null) return;
            
            if (!newUsername.trim() || !newPassword.trim()) {
                alert("Usuario y contraseña no pueden estar vacíos.");
                return;
            }
            
            try {
                const res = await fetch('/api/admin/users/edit', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id, username: newUsername, password: newPassword })
                });
                const data = await res.json();
                if (data.ok) {
                    loadUsers();
                } else {
                    alert(data.error || "Error al editar");
                }
            } catch (err) {
                alert("Error de conexión");
            }
        }

        async function deleteUser(id, username) {
            if (!confirm(`¿Estás seguro de que quieres eliminar a ${username}?\nYa no podrá entrar a la app.`)) return;
            
            try {
                const res = await fetch('/api/admin/users/delete', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id })
                });
                const data = await res.json();
                if (data.ok) {
                    loadUsers();
                } else {
                    alert(data.error || "Error al eliminar");
                }
            } catch (err) {
                alert("Error de conexión");
            }
        }

        async function resetMonth() {
            if (!confirm(`¿Estás seguro de iniciar un nuevo mes?\n\nEsto regresará a TODOS tus compañeros a "❌ DEBE" y les bloqueará el acceso hasta que te vuelvan a pagar.`)) return;
            
            try {
                const res = await fetch('/api/admin/users/reset', { method: 'POST' });
                const data = await res.json();
                if (data.ok) {
                    loadUsers();
                    alert("¡Nuevo mes iniciado! Todos los accesos han sido bloqueados.");
                }
            } catch (err) {
                alert("Error de conexión");
            }
        }

        window.onload = function() {
            loadUsers();
            document.getElementById('new-username').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    addUser();
                }
            });
        };
    </script>
</body>
</html>
