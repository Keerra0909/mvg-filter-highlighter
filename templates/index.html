<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Room Highlighter</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-decor"></div>
    <div class="container">
        <header>
            <h3 class="mvg-title" style="color: #4ade80; margin-bottom: 0px; font-weight: 600; font-size: 1.2rem; letter-spacing: 2px;">MVG</h3>
            <h1 style="margin-top: 5px;">Room Highlighter</h1>
            <p>Upload your daily Excel and PDF to automatically highlight room numbers.</p>
        </header>

        <form id="upload-form">
            <div class="upload-area" id="excel-area" onclick="document.getElementById('excel_file').click()">
                <input type="file" id="excel_file" name="excel_file" accept=".xlsx, .xls, .csv" required hidden>
                <div class="upload-content">
                    <span class="icon">📊</span>
                    <h3>Select Excel File</h3>
                    <p class="file-name" id="excel-name">Tap to select your list</p>
                </div>
            </div>

            <div class="upload-area" id="pdf-area" onclick="document.getElementById('pdf_file').click()">
                <input type="file" id="pdf_file" name="pdf_file" accept=".pdf" required hidden>
                <div class="upload-content">
                    <span class="icon">📄</span>
                    <h3>Select PDF File</h3>
                    <p class="file-name" id="pdf-name">Tap to select the report</p>
                </div>
            </div>

            <button type="submit" id="submit-btn" disabled>Highlight PDF</button>
        </form>

        <div id="status" class="hidden">
            <div class="spinner"></div>
            <p id="status-text">Processing your files...</p>
        </div>

        <div id="result" class="hidden">
            <div class="success-icon">✅</div>
            <p id="result-text">Success!</p>
            <a id="download-btn" href="#" class="btn primary">Download PDF</a>
            <button id="reset-btn" class="btn secondary">Start Over</button>
        </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
