<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin — MVG</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
            color: white;
        }
        .card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            backdrop-filter: blur(10px);
        }
        .lock-icon { font-size: 2.5rem; text-align: center; margin-bottom: 10px; }
        h1 { text-align: center; font-size: 1.4rem; font-weight: 700; margin-bottom: 6px; }
        .subtitle { text-align: center; color: #94a3b8; font-size: 0.85rem; margin-bottom: 30px; }
        label { display: block; font-size: 0.85rem; color: #94a3b8; margin-bottom: 6px; margin-top: 18px; font-weight: 500; }
        input {
            width: 100%;
            padding: 12px 15px;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: border-color 0.2s;
        }
        input:focus { border-color: rgba(99,102,241,0.6); }
        .btn {
            width: 100%;
            margin-top: 28px;
            padding: 14px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            transition: opacity 0.2s, transform 0.1s;
        }
        .btn:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .msg {
            margin-top: 18px;
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 0.9rem;
            text-align: center;
            display: none;
        }
        .msg.error { background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.3); color: #fca5a5; }
        .msg.success { background: rgba(16,185,129,0.15); border: 1px solid rgba(16,185,129,0.3); color: #6ee7b7; }
    </style>
</head>
<body>
    <div class="card">
        <div class="lock-icon">🔐</div>
        <h1>Change Password</h1>
        <p class="subtitle">Admin access only</p>

        <label>Current Password</label>
        <input type="password" id="current" placeholder="Enter current password" autocomplete="current-password">

        <label>New Password</label>
        <input type="password" id="new-pw" placeholder="At least 4 characters" autocomplete="new-password">

        <label>Confirm New Password</label>
        <input type="password" id="confirm" placeholder="Repeat new password" autocomplete="new-password">

        <button class="btn" id="save-btn">Save New Password</button>

        <div class="msg" id="msg"></div>
    </div>

    <script>
        const btn = document.getElementById('save-btn');
        const msgEl = document.getElementById('msg');

        function showMsg(text, type) {
            msgEl.textContent = text;
            msgEl.className = 'msg ' + type;
            msgEl.style.display = 'block';
        }

        btn.addEventListener('click', () => {
            const current  = document.getElementById('current').value.trim();
            const newPw    = document.getElementById('new-pw').value.trim();
            const confirm  = document.getElementById('confirm').value.trim();

            if (!current || !newPw || !confirm) {
                showMsg('Please fill in all fields.', 'error');
                return;
            }
            if (newPw !== confirm) {
                showMsg('New passwords do not match.', 'error');
                return;
            }
            if (newPw.length < 4) {
                showMsg('New password must be at least 4 characters.', 'error');
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Saving...';

            fetch('/mvg-admin-9x7/change', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({current, new_password: newPw, confirm})
            })
            .then(r => r.json())
            .then(data => {
                if (data.ok) {
                    showMsg('✅ Password changed successfully!', 'success');
                    document.getElementById('current').value = '';
                    document.getElementById('new-pw').value = '';
                    document.getElementById('confirm').value = '';
                } else {
                    showMsg(data.error || 'Something went wrong.', 'error');
                }
            })
            .catch(() => showMsg('Connection error. Try again.', 'error'))
            .finally(() => { btn.disabled = false; btn.textContent = 'Save New Password'; });
        });

        // Allow Enter key
        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('keydown', e => { if (e.key === 'Enter') btn.click(); });
        });
    </script>
</body>
</html>
